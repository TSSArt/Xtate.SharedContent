name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  Configuration: Release

concurrency:
  group: Publish
  cancel-in-progress: true
  
jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '11.0.x'
    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v4.5.0
      with:
        versionSpec: '6.5.x'
    - name: Determine Version
      uses: gittools/actions/gitversion/execute@v4.5.0
    - name: Update version in .nuspec
      uses: vers-one/dotnet-project-version-updater@v1.7
      with:
        file: "**/*.nuspec"
        version: ${{ env.fullSemVer }}
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration ${{ env.Configuration }} --no-restore -p:Version=${{ env.fullSemVer }}
    - name: Pack
      run: dotnet pack --configuration ${{ env.Configuration }} --no-build -p:PackageVersion=${{ env.fullSemVer }} -o bin/packages
    - name: Publish to NuGet.org
      run: dotnet nuget push bin/packages/*.nupkg -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGET_ORG_TOKEN }}
    - name: Publish to GitHub
      run: dotnet nuget push bin/packages/*.nupkg -s https://nuget.pkg.github.com/TSSArt/index.json -k ${{ secrets.XTATE_GITHUB_TOKEN }}
